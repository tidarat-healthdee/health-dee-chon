<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff8f0;
  color:#333;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
  padding-bottom:90px;
}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-top:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#ff9800;
}

.shop-item{
  border:1px solid #eee;
  border-radius:18px;
  padding:16px;
  margin-top:16px;
}

.buy-btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#ff9800;
  color:white;
  font-size:16px;
  font-weight:bold;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:480px;
  margin:auto;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -4px 16px rgba(0,0,0,0.08);
  border-radius:20px 20px 0 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#777;
  font-size:13px;
  text-align:center;
}

.bottom-nav a.active{
  color:#ff9800;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">
🛒 ร้านค้า
</div>

<div id="diamondBalance" style="margin-top:12px;font-size:18px;font-weight:bold;color:#1e88e5;">
  💎 กำลังโหลดเพชร...
</div>

<div class="shop-item">

  <div style="font-size:42px;text-align:center;">🧊</div>

  <h3 style="text-align:center;margin-bottom:8px;">
    Streak Freeze
  </h3>

  <p style="text-align:center;color:#666;line-height:1.5;">
    ใช้ป้องกัน Streak หายได้ 1 วัน  
    เหมาะสำหรับวันที่ไม่สะดวกส่งภารกิจ
  </p>

  <div style="background:#e3f2fd;border-radius:16px;padding:14px;margin-top:14px;">
    <b>ราคา:</b> 30 💎 / 1 ก้อน<br>
    <b>จำกัด:</b> ซื้อได้ไม่เกิน 3 ก้อนต่อเดือน
  </div>

  <button class="buy-btn" onclick="buyFreezeFromShop()">
    ซื้อ Streak Freeze
  </button>

</div>

</div>

</div>

<div class="bottom-nav">
  <a href="index.html">🏠<br>ภารกิจ</a>
  <a href="leaderboard.html">🏆<br>อันดับ</a>
  <a class="active" href="shop.html">🛒<br>ร้านค้า</a>
  <a href="profile.html">👤<br>โปรไฟล์</a>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2010154691-Lfwg705W";
const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

let currentUserId = "";

function jsonp(action, params = {}){

  return new Promise(function(resolve){

    const callbackName = "callback_" + Date.now();

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    let url = GAS_URL + "?action=" + action + "&callback=" + callbackName;

    for(const key in params){
      url += "&" + key + "=" + encodeURIComponent(params[key]);
    }

    const script = document.createElement("script");
    script.src = url;
    document.body.appendChild(script);

  });

}

async function initShop(){

  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  currentUserId = profile.userId;
  const data = await jsonp("getHomeData", {
  userId: currentUserId
});

document.getElementById("diamondBalance").innerText =
  "💎 เพชรของคุณ: " + (data.score.diamonds || 0);

}

async function buyFreezeFromShop(){

  const result = await jsonp("buyFreeze", {
  userId: currentUserId
});

if(result.status == "success"){

  showShopPopup(
    "🧊 ซื้อสำเร็จ",
    "ได้รับ Streak Freeze +1<br>" +
    "ใช้ 💎 30 เพชร"
  );

  await initShop();

}else{

  showShopPopup(
    "ซื้อไม่สำเร็จ",
    result.message || "กรุณาลองใหม่อีกครั้ง"
  );

}
  
function showShopPopup(title, message){

  const popup = document.createElement("div");

  popup.innerHTML = `
    <div style="
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    ">

      <div style="
        background:white;
        width:80%;
        max-width:320px;
        border-radius:24px;
        padding:24px;
        text-align:center;
        box-shadow:0 14px 40px rgba(0,0,0,0.22);
      ">

        <div style="font-size:24px;font-weight:bold;">
          ${title}
        </div>

        <div style="
          margin-top:16px;
          line-height:1.6;
          color:#555;
        ">
          ${message}
        </div>

        <button onclick="this.closest('div').parentElement.remove()"
          style="
            margin-top:20px;
            width:100%;
            border:none;
            border-radius:14px;
            padding:14px;
            background:#ff9800;
            color:white;
            font-size:16px;
            font-weight:bold;
          ">
          ตกลง
        </button>

      </div>
    </div>
  `;

  document.body.appendChild(popup);

}
  
initShop();
</script>
  
</body>
</html>
