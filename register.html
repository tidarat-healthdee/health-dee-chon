<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff8f0;
  color:#333;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-top:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#ff9800;
}

.progress{
  height:12px;
  background:#ffe0b2;
  border-radius:20px;
  overflow:hidden;
  margin-top:16px;
}

.progress-bar{
  height:12px;
  width:33%;
  background:#ff9800;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#ff9800;
  color:white;
  font-size:18px;
  font-weight:bold;
  margin-top:20px;
}

.step{
  display:none;
}

.step.active{
  display:block;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">ลงทะเบียน Health Dee CHON</div>

<div style="margin-top:8px;">
กรุณากรอกข้อมูลก่อนเข้าร่วมกิจกรรม
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div style="margin-top:10px;" id="stepText">
ขั้นตอนที่ 1/3
</div>

<!-- STEP 1 -->

<div class="step active" id="step1">

<h3>ข้อมูลทั่วไป</h3>

<input type="text" id="fullName" placeholder="ชื่อ-นามสกุล">

<input type="text" id="nickName" placeholder="ชื่อเล่น">

<input type="number" id="age" placeholder="อายุ">

<select id="gender">
  <option value="">เลือกเพศ</option>
  <option>ชาย</option>
  <option>หญิง</option>
  <option>LGBTQ+</option>
</select>

<input type="tel" id="phone" placeholder="เบอร์โทรศัพท์">

<button onclick="nextStep(2)">
ถัดไป
</button>

</div>

<!-- STEP 2 -->

<div class="step" id="step2">

<h3>ข้อมูลสุขภาพ</h3>

<input type="number" id="weight" placeholder="น้ำหนัก (kg)">

<input type="number" id="height" placeholder="ส่วนสูง (cm)">

<input type="number" id="waist" placeholder="รอบเอว">

<input type="number" id="systolic" placeholder="ความดันตัวบน">

<input type="number" id="diastolic" placeholder="ความดันตัวล่าง">

<button onclick="nextStep(3)">
ถัดไป
</button>

</div>

<!-- STEP 3 -->

<div class="step" id="step3">

<h3>พฤติกรรมสุขภาพ</h3>

<select id="exerciseHabit">
  <option value="">ออกกำลังกาย</option>
  <option>ไม่ค่อยออก</option>
  <option>1-2 วัน/สัปดาห์</option>
  <option>3 วันขึ้นไป/สัปดาห์</option>
</select>

<select id="foodHabit">
  <option value="">พฤติกรรมการกิน</option>
  <option>ชอบหวาน</option>
  <option>ชอบมัน</option>
  <option>กินผักผลไม้สม่ำเสมอ</option>
</select>

<select id="sleepHabit">
  <option value="">การนอน</option>
  <option>นอนน้อยกว่า 6 ชม.</option>
  <option>6-8 ชม.</option>
  <option>มากกว่า 8 ชม.</option>
</select>

<button onclick="submitRegister()">
ลงทะเบียน
</button>

</div>

</div>

</div>

<script>

function nextStep(step){

  document.querySelectorAll(".step").forEach(function(el){
    el.classList.remove("active");
  });

  document.getElementById("step"+step)
    .classList.add("active");

  document.getElementById("stepText")
    .innerText = "ขั้นตอนที่ " + step + "/3";

  let width = "33%";

  if(step == 2) width = "66%";
  if(step == 3) width = "100%";

  document.getElementById("progressBar")
    .style.width = width;

}

const LIFF_ID = "2010154691-Lfwg705W";
const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

let lineProfile = null;

async function initRegister(){

  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  lineProfile = await liff.getProfile();

}

async function submitRegister(){

  if(!lineProfile){
    alert("ยังเชื่อมต่อ LINE ไม่สำเร็จ");
    return;
  }

  const weight = Number(document.getElementById("weight").value);
  const height = Number(document.getElementById("height").value);
  const bmi = weight / Math.pow(height / 100, 2);

  await fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {"Content-Type":"text/plain"},
    body: JSON.stringify({
      action: "registerFullProfile",
      userId: lineProfile.userId,
      displayName: lineProfile.displayName,
      pictureUrl: lineProfile.pictureUrl,
      companyCode: "ABC",
      companyName: "บริษัท ABC",
      fullName: document.getElementById("fullName").value,
      nickName: document.getElementById("nickName").value,
      age: document.getElementById("age").value,
      gender: document.getElementById("gender").value,
      phone: document.getElementById("phone").value,
      department: "",
      weight: weight,
      height: height,
      bmi: bmi.toFixed(2),
      waist: document.getElementById("waist").value,
      systolic: document.getElementById("systolic").value,
      diastolic: document.getElementById("diastolic").value,
      exerciseHabit: document.getElementById("exerciseHabit").value,
      foodHabit: document.getElementById("foodHabit").value,
      sweetDrinkHabit: "",
      sleepHabit: document.getElementById("sleepHabit").value
    })
  });

  alert("ลงทะเบียนสำเร็จ");

  window.location.href = "index.html";
}

initRegister();
  
</script>

</body>
</html>
