<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff8f0;
  color:#333;
}
.app{
  max-width:480px;
  margin:auto;
  padding:20px;
}
.hero{
  background:linear-gradient(135deg,#fff,#ffe0b2);
  border-radius:28px;
  padding:24px;
  box-shadow:0 8px 24px rgba(255,152,0,0.18);
}
.title{
  font-size:28px;
  font-weight:bold;
  color:#e67e00;
}
.card{
  background:white;
  border-radius:24px;
  padding:20px;
  margin-top:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
button{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  background:#ff9800;
  color:white;
  font-size:18px;
  font-weight:bold;
}
hr{
  border:none;
  height:1px;
  background:#f3d7b6;
  margin:28px 0;
}
</style>
</head>

<body>
<div class="app">

<div class="hero">
  <div class="title">Health Dee CHON</div>
  <div style="margin-top:8px;">Wellness Challenge Platform</div>
  <div id="status" style="margin-top:16px;">กำลังเชื่อมต่อ LINE...</div>

  <div class="card">
    <div>คะแนนของคุณ</div>
    <div id="myPoints" style="font-size:36px;font-weight:bold;color:#ff9800;">0</div>
    <div id="myStreak">🔥 0 Day Streak</div>
    <div id="myFreeze" style="margin-top:6px;">🧊 Streak Freeze: 0</div>
    <div id="myLevel" style="margin-top:10px;font-weight:bold;">Level: Beginner</div>

    <div style="background:#ffe0b2;border-radius:20px;margin-top:8px;height:14px;">
      <div id="progressBar" style="background:#ff9800;width:0%;height:14px;border-radius:20px;"></div>
    </div>

    <div id="progressText" style="font-size:13px;margin-top:6px;color:#777;">
      0 / 100 คะแนน
    </div>

    <div id="badgeBox" style="margin-top:12px;font-size:15px;">
      กำลังโหลด Badge...
    </div>
  </div>
</div>

<hr>

<div class="card">
  <h3>ภารกิจวันนี้</h3>
  <div id="missionBox">กำลังโหลดภารกิจ...</div>
  <br>
  <input type="file" id="imageUpload" accept="image/*">
  <br><br>
  <button onclick="submitMission()">ส่งภารกิจ</button>
</div>

<hr>

<h3>อันดับในบริษัท</h3>
<div id="leaderboardBox">กำลังโหลดอันดับ...</div>

<hr>

<h3>Admin Dashboard</h3>
<div id="adminDashboard">กำลังโหลดข้อมูล...</div>

</div>

<script>
const LIFF_ID = "2010154691-Lfwg705W";
const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

let currentUserId = "";
let currentDisplayName = "";

function jsonp(action, params = {}){

  return new Promise(function(resolve){

    const callbackName = "callback_" + Date.now();

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    let url = GAS_URL + "?action=" + action + "&callback=" + callbackName;

    for(const key in params){
      url += "&" + key + "=" + encodeURIComponent(params[key]);
    }

    const script = document.createElement("script");
    script.src = url;
    document.body.appendChild(script);

  });
}

async function main(){

  const status = document.getElementById("status");

  try{

    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    currentUserId = profile.userId;
    currentDisplayName = profile.displayName;

    status.innerHTML =
      "สวัสดีคุณ " + profile.displayName + "<br><br>" +
      "LINE User ID:<br>" + profile.userId;

    fetch(GAS_URL, {
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({
        action:"registerUser",
        userId:profile.userId,
        displayName:profile.displayName,
        pictureUrl:profile.pictureUrl,
        companyCode:"ABC"
      })
    });

    setTimeout(loadHomeData, 1200);

  }catch(error){
    status.innerText = "ERROR: " + error.message;
  }
}

async function loadHomeData(){

  const data = await jsonp("getHomeData", {
    userId: currentUserId
  });

  document.getElementById("missionBox").innerText =
    "สัปดาห์ที่ " + data.mission.week + " : " + data.mission.mission;

  updateScoreDisplay(data.score);
  updateLeaderboard(data.leaderboard);
  updateDashboard(data.dashboard);
}

function updateScoreDisplay(score){

  document.getElementById("myPoints").innerText = score.points;
  document.getElementById("myStreak").innerText = "🔥 " + score.streak + " Day Streak";
  document.getElementById("myFreeze").innerText = "🧊 Streak Freeze: " + score.freeze;

  updateLevel(Number(score.points));
  updateBadges(Number(score.points), Number(score.streak));
}

function updateLeaderboard(list){

  let html = "";

  for(let i=0; i<list.length; i++){
    html += "#" + (i+1) + " " + list[i].name + " - " + list[i].points + " คะแนน<br>";
  }

  document.getElementById("leaderboardBox").innerHTML = html;
}

function updateDashboard(data){

  document.getElementById("adminDashboard").innerHTML =
    "จำนวนผู้เข้าร่วม: " + data.totalUsers + " คน<br>" +
    "จำนวนการส่งภารกิจ: " + data.totalSubmissions + " ครั้ง<br>" +
    "คะแนนรวมทั้งหมด: " + data.totalPoints + " คะแนน";
}

async function submitMission(){

  const file = document.getElementById("imageUpload").files[0];

  if(!file){
    alert("กรุณาเลือกรูป");
    return;
  }

  const already = await jsonp("checkTodaySubmission", {
    userId: currentUserId
  });

  if(already.submitted){
    alert("วันนี้คุณส่งภารกิจแล้ว");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event){

    const img = new Image();

    img.onload = async function(){

      const canvas = document.createElement("canvas");
      const maxWidth = 800;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const resizedBase64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];

      await fetch(GAS_URL, {
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          action:"submitMission",
          userId:currentUserId,
          displayName:currentDisplayName,
          mission:document.getElementById("missionBox").innerText,
          fileName:"mission.jpg",
          base64Data:resizedBase64
        })
      });

      alert("กำลังตรวจสอบผลการส่ง...");

      setTimeout(async function(){

        const check = await jsonp("checkTodaySubmission", {
          userId: currentUserId
        });

        if(check.submitted){
          alert("🎉 ส่งภารกิจสำเร็จแล้ว");
          document.getElementById("imageUpload").value = "";
          loadHomeData();
        }else{
          alert("ยังไม่พบข้อมูลการส่ง กรุณาลองใหม่");
        }

      }, 2500);
    };

    img.src = event.target.result;
  };

  reader.readAsDataURL(file);
}

function updateLevel(points){

  let level = "Beginner";
  let nextGoal = 100;

  if(points >= 600){
    level = "Health Champion";
    nextGoal = 1000;
  }else if(points >= 300){
    level = "Wellness Hero";
    nextGoal = 600;
  }else if(points >= 100){
    level = "Healthy Starter";
    nextGoal = 300;
  }

  const percent = Math.min((points / nextGoal) * 100, 100);

  document.getElementById("myLevel").innerText = "Level: " + level;
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText =
    points + " / " + nextGoal + " คะแนน";
}

function updateBadges(points, streak){

  let badges = [];

  if(points >= 100) badges.push("🌱 Healthy Starter");
  if(points >= 300) badges.push("🥗 Wellness Hero");
  if(points >= 600) badges.push("🏆 Health Champion");
  if(streak >= 3) badges.push("🔥 ไฟลุก 3 วัน");
  if(streak >= 7) badges.push("🔥🔥 ไฟลุก 7 วัน");

  if(badges.length == 0){
    badges.push("เริ่มสะสม Badge แรกกันเลย!");
  }

  document.getElementById("badgeBox").innerHTML = badges.join("<br>");
}

main();
</script>

</body>
</html>
