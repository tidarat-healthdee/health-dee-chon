<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff8f0;
  color:#333;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
  padding-bottom:90px;
}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-top:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#ff9800;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:480px;
  margin:auto;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -4px 16px rgba(0,0,0,0.08);
  border-radius:20px 20px 0 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#777;
  font-size:13px;
  text-align:center;
}

.bottom-nav a.active{
  color:#ff9800;
  font-weight:bold;
}

.rank-card{
  background:white;
  border-radius:22px;
  padding:18px;
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.rank-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.rank-no{
  font-size:24px;
  font-weight:bold;
  color:#ff9800;
  width:42px;
}

.rank-name{
  font-size:18px;
  font-weight:bold;
}

.rank-point{
  font-size:18px;
  color:#1e88e5;
  font-weight:bold;
}

.podium{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:10px;
  margin-top:22px;
}

.podium-card{
  background:white;
  border-radius:22px;
  padding:14px 10px;
  text-align:center;
  width:30%;
  box-shadow:0 8px 22px rgba(0,0,0,0.10);
}

.podium-card.first{
  min-height:170px;
  background:#fff8e1;
}

.podium-card.second{
  min-height:140px;
  background:#f5f5f5;
}

.podium-card.third{
  min-height:120px;
  background:#fff3e0;
}

.podium-avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:8px;
}

.medal{
  font-size:28px;
}

.podium-name{
  font-size:14px;
  font-weight:bold;
  margin-top:4px;
}

.podium-points{
  font-size:13px;
  color:#1e88e5;
  margin-top:4px;
}

.podium-card{
  position:relative;
  background:linear-gradient(180deg,#ffffff,#fffaf3);
  border-radius:24px;
  padding:16px 10px;
  text-align:center;
  width:30%;
  box-shadow:0 12px 30px rgba(0,0,0,0.12);
  border:1px solid rgba(255,255,255,0.9);
}

.podium-card.first{
  min-height:190px;
  transform:translateY(-12px);
  background:linear-gradient(180deg,#fff8e1,#ffffff);
  box-shadow:0 16px 36px rgba(255,193,7,0.28);
}

.podium-card.second{
  min-height:155px;
}

.podium-card.third{
  min-height:140px;
}

.podium-medal{
  font-size:30px;
  margin-bottom:6px;
}

.podium-avatar{
  width:62px;
  height:62px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid white;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

.podium-name{
  margin-top:8px;
  font-size:14px;
  font-weight:800;
}

.podium-badge{
  margin-top:4px;
  font-size:11px;
  color:#777;
}

.podium-points{
  margin-top:6px;
  font-size:13px;
  color:#ef6c00;
  font-weight:800;
}
  
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">
🏆 ตารางคะแนน
</div>

<div id="leaderboardList">
  กำลังโหลดอันดับ...
</div>

</div>

</div>

<div class="bottom-nav">
  <a href="index.html">🏠<br>ภารกิจ</a>
  <a class="active" href="leaderboard.html">🏆<br>อันดับ</a>
  <a href="shop.html">🛒<br>ร้านค้า</a>
  <a href="profile.html">👤<br>โปรไฟล์</a>
</div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2010154691-Lfwg705W";
const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

function jsonp(action, params = {}){

  return new Promise(function(resolve){

    const callbackName = "callback_" + Date.now();

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    let url = GAS_URL + "?action=" + action + "&callback=" + callbackName;

    for(const key in params){
      url += "&" + key + "=" + encodeURIComponent(params[key]);
    }

    const script = document.createElement("script");
    script.src = url;
    document.body.appendChild(script);

  });

}

async function initLeaderboard(){

  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const data = await jsonp("getHomeData", {
    userId: profile.userId
  });

  let html = "";

const top3 = data.leaderboard.slice(0, 3);
const rest = data.leaderboard.slice(3);

if(top3.length > 0){

  html += `<div class="podium">`;

  if(top3[1]){
    html += createPodiumCard(top3[1], "🥈", "second");
  }

  if(top3[0]){
    html += createPodiumCard(top3[0], "🥇", "first");
  }

  if(top3[2]){
    html += createPodiumCard(top3[2], "🥉", "third");
  }

  html += `</div>`;
}

for(let i = 0; i < rest.length; i++){

  html += `
    <div class="rank-card">
      <div class="rank-left">
  <div class="rank-no">#${i + 4}</div>

  <div>
    <div class="rank-name">${rest[i].name}</div>

    <div style="font-size:12px;color:#777;margin-top:3px;">
      ${rest[i].badge || ""}
    </div>
  </div>

</div>
      <div class="rank-point">
        ${rest[i].points} คะแนน
      </div>
    </div>
  `;

  }

  document.getElementById("leaderboardList").innerHTML = html;

}

function createPodiumCard(user, medal, rankClass){

  const img = user.pictureUrl || "https://via.placeholder.com/100";

  return `
    <div class="podium-card ${rankClass}">

      <div class="podium-medal">${medal}</div>

      <img class="podium-avatar" src="${img}">

      <div class="podium-name">${user.name}</div>

      <div class="podium-badge">
        ${user.badge || "🌱 Beginner"}
      </div>

      <div class="podium-points">
        ${user.points} คะแนน
      </div>

    </div>
  `;
}
  
initLeaderboard();
</script>
  
</body>
</html>
