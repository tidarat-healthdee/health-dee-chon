<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#fff8f0;
  color:#333;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
  padding-bottom:90px;
}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-top:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#ff9800;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:480px;
  margin:auto;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -4px 16px rgba(0,0,0,0.08);
  border-radius:20px 20px 0 0;
}

.bottom-nav a{
  text-decoration:none;
  color:#777;
  font-size:13px;
  text-align:center;
}

.bottom-nav a.active{
  color:#ff9800;
  font-weight:bold;
}

.rank-card{
  background:white;
  border-radius:22px;
  padding:18px;
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.rank-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.rank-no{
  font-size:24px;
  font-weight:bold;
  color:#ff9800;
  width:42px;
}

.rank-name{
  font-size:18px;
  font-weight:bold;
}

.rank-point{
  font-size:18px;
  color:#1e88e5;
  font-weight:bold;
}

.podium{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:10px;
  margin-top:26px;
  margin-bottom:22px;
  padding-bottom:24px;
}

.podium-card{
  position:relative;
  width:30%;
  text-align:center;
  border-radius:26px;
  padding:16px 8px;
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  box-shadow:0 10px 28px rgba(0,0,0,0.10);
  border:1px solid rgba(255,255,255,0.9);
}

.podium-card.first{
  min-height:196px;
  transform:translateY(-6px);
  background:linear-gradient(180deg,#fff8e1,#ffffff);
  border:2px solid #ffd54f;
  position:relative;
}

.podium-card.second{
  min-height:162px;
  border:1.5px solid #cfd8dc;
  position:relative;
}

.podium-card.third{
  min-height:148px;
  border:1.5px solid #ffcc80;
  position:relative;
}

.podium-medal{
  font-size:30px;
  margin-bottom:6px;
}

.podium-avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid white;
  box-shadow:0 8px 20px rgba(0,0,0,0.16);
}

.podium-name{
  margin-top:8px;
  font-size:14px;
  font-weight:900;
  color:#333;
}

.podium-badge{
  margin-top:4px;
  font-size:11px;
  color:#777;
}

.podium-points{
  margin-top:6px;
  font-size:13px;
  color:#ef6c00;
  font-weight:900;
}

.rank-card{
  background:white;
  border-radius:22px;
  padding:16px;
  margin-top:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 6px 18px rgba(0,0,0,0.07);
  border:1px solid rgba(255,255,255,0.9);
}

.rank-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.rank-no{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#fff3e0,#e3f2fd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:#ef6c00;
}

.rank-name{
  font-size:16px;
  font-weight:800;
  color:#333;
}

.rank-point{
  font-size:16px;
  color:#1e88e5;
  font-weight:900;
}

.leaderboard-header{
  text-align:center;
  margin-bottom:22px;
}

.champion-pill{
  display:inline-block;

  padding:12px 24px;

  border-radius:999px;

  background:linear-gradient(
    135deg,
    #e8f5e9,
    #e3f2fd
  );

  color:#2e7d32;

  font-size:26px;
  font-weight:900;

  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.leaderboard-subtitle{
  margin-top:10px;
  font-size:13px;
  color:#666;
}

.leaderboard-subtitle span{
  color:#1e88e5;
  font-weight:700;
}
.your-rank-card{
  margin-top:22px;
  padding:18px;
  border-radius:24px;
  background:linear-gradient(135deg,#fff8e1,#ffffff);
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  text-align:center;
}

.your-rank-label{
  font-size:13px;
  color:#777;
  font-weight:700;
  margin-bottom:8px;
}

#yourRankBox{
  font-size:18px;
  font-weight:900;
  color:#ef6c00;
}

.champion-crown{
  position:absolute;
  top:-22px;
  left:50%;
  transform:translateX(-50%);
  font-size:34px;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,0.18));
}

.champion-header{
  margin:12px 0 20px;
  padding:16px 18px;
  border-radius:24px;

  background:
  linear-gradient(
    135deg,
    #fff8e1 0%,
    #fffdf6 100%
  );

  border:2px solid #ffd54f;

  box-shadow:
    0 10px 24px rgba(255,193,7,0.12);

  position:relative;
  overflow:hidden;
}

.champion-header::before{
  content:"";
  position:absolute;
  right:-40px;
  top:-40px;

  width:140px;
  height:140px;

  background:
  radial-gradient(
    circle,
    rgba(255,215,64,0.25),
    transparent 70%
  );

  border-radius:50%;
}

.champion-header-inner{
  display:flex;
  align-items:center;
  gap:14px;
}

.champion-icon{
  font-size:42px;
}

.champion-title{
  font-size:26px;
  font-weight:900;
  color:#f57c00;
}

.champion-subtitle{
  margin-top:4px;
  font-size:12px;
  color:#666;
}

.champion-subtitle span{
  color:#ff9800;
  font-weight:700;
}

.podium-card.first::after{
  content:"";
  position:absolute;
  left:8%;
  bottom:-18px;

  width:86%;
  height:12px;

  border-radius:0 0 18px 18px;

  background:linear-gradient(
    180deg,
    #ffd54f,
    #ffb300
  );

  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.podium-card.second::after{
  content:"";
  position:absolute;
  left:8%;
  bottom:-16px;

  width:84%;
  height:16px;

  border-radius:0 0 16px 16px;

  background:linear-gradient(
    180deg,
    #cfd8dc,
    #90a4ae
  );

  box-shadow:0 4px 10px rgba(0,0,0,0.12);
}

.podium-card.third::after{
  content:"";
  position:absolute;
  left:8%;
  bottom:-14px;

  width:84%;
  height:14px;

  border-radius:0 0 14px 14px;

  background:linear-gradient(
    180deg,
    #d7a07a,
    #b87333
  );

  box-shadow:0 4px 10px rgba(0,0,0,0.12);
}
.app-header{
  display:flex;
  align-items:center;
  gap:14px;

  position:relative;
  overflow:hidden;

  background:
    radial-gradient(circle at 88% 18%, rgba(255,255,255,0.65) 0, rgba(255,255,255,0) 26%),
    radial-gradient(circle at 10% 85%, rgba(129,199,132,0.20) 0, rgba(129,199,132,0) 30%),
    linear-gradient(135deg,#f8f6e9 0%,#eef7f1 48%,#edf5ff 100%);

  border-radius:24px;
  padding:16px;
  margin-bottom:18px;

  box-shadow:0 12px 34px rgba(0,0,0,0.10);
  border:1px solid rgba(255,255,255,0.75);
}

.app-header::before{
  content:"";

  position:absolute;

  width:180px;
  height:180px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.45),
      transparent 70%
    );

  top:-60px;
  right:-60px;

  pointer-events:none;
}

.app-header::after{
  content:"";

  position:absolute;

  width:140px;
  height:140px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.25),
      transparent 70%
    );

  bottom:-50px;
  left:-40px;

  pointer-events:none;
}
  
.header-logo-img{
  width:76px;
  height:76px;

  border-radius:50%;
  object-fit:cover;

  background:white;

  padding:5px;

  border:2px solid rgba(255,255,255,0.8);

  box-shadow:
    0 6px 18px rgba(0,0,0,0.14);

  flex-shrink:0;
}

.header-content{
  flex:1;
}

.header-title{
  font-size:23px;
  font-weight:bold;

  color:#1b5e20;

  line-height:1.1;

  text-shadow:
    0 2px 6px rgba(0,0,0,0.10);
}

.header-subtitle{
  display:inline-block;
  font-size:13px;
  color:white;
  background:linear-gradient(90deg,#1565c0,#43a047);
  padding:4px 10px;
  border-radius:999px;
  margin-top:6px;
  font-weight:bold;
  position:relative;
  z-index:2;
}

.header-tagline{
  font-size:13px;

  color:#666;

  margin-top:7px;
}
  
</style>
</head>

<body>
  
<div class="app-header">

  <img src="logo.png" class="header-logo-img">

 <div id="leaderboardList">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2010154691-Lfwg705W";
const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

function jsonp(action, params = {}){

  return new Promise(function(resolve){

    const callbackName = "callback_" + Date.now();

    window[callbackName] = function(data){
      resolve(data);
      delete window[callbackName];
      script.remove();
    };

    let url = GAS_URL + "?action=" + action + "&callback=" + callbackName;

    for(const key in params){
      url += "&" + key + "=" + encodeURIComponent(params[key]);
    }

    const script = document.createElement("script");
    script.src = url;
    document.body.appendChild(script);

  });

}

async function initLeaderboard(){

  await liff.init({ liffId: LIFF_ID });

  if(!liff.isLoggedIn()){
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const data = await jsonp("getHomeData", {
    userId: profile.userId
  });

  let html = "";

const top3 = data.leaderboard.slice(0, 3);
const rest = data.leaderboard.slice(3);

if(top3.length > 0){

  html += `<div class="podium">`;

  if(top3[1]){
    html += createPodiumCard(top3[1], "🥈", "second");
  }

  if(top3[0]){
    html += createPodiumCard(top3[0], "🥇", "first");
  }

  if(top3[2]){
    html += createPodiumCard(top3[2], "🥉", "third");
  }

  html += "</div>";
}

html += `
  <div class="your-rank-card">

    <div class="your-rank-label">
      📍 อันดับของคุณ
    </div>

    <div id="yourRankBox">
      #1 S.Tidarat • 124 คะแนน
    </div>

  </div>
`;

for(let i = 0; i < rest.length; i++){

  html += `
    <div class="rank-card">
      <div class="rank-left">
  <div class="rank-no">#${i + 4}</div>

  <div>
    <div class="rank-name">${rest[i].name}</div>

    <div style="font-size:12px;color:#777;margin-top:3px;">
      ${rest[i].badge || ""}
    </div>
  </div>

</div>
      <div class="rank-point">
        ${rest[i].points} คะแนน
      </div>
    </div>
  `;

  }

  document.getElementById("leaderboardList").innerHTML = html;

}

function createPodiumCard(user, medal, rankClass){

  const img = user.pictureUrl || "https://via.placeholder.com/100";

  return `
    <div class="podium-card ${rankClass}">
       ${rankClass == "first" ? '<div class="champion-crown">👑</div>' : ''}

      <div class="podium-medal">${medal}</div>

      <img class="podium-avatar" src="${img}">

      <div class="podium-name">${user.name}</div>

      <div class="podium-badge">
        ${user.badge || "🌱 Beginner"}
      </div>

      <div class="podium-points">
        ${user.points} คะแนน
      </div>

    </div>
  `;
}
  
initLeaderboard();
</script>
