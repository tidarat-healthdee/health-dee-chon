<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#333;
}

.app{
  max-width:480px;
  margin:auto;
  padding:20px;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#43a047);
  color:white;
  padding:24px;
  border-radius:24px;
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin-top:8px;
  opacity:0.9;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card-title{
  color:#777;
  font-size:14px;
}

.card-value{
  font-size:34px;
  font-weight:bold;
  margin-top:10px;
}

.section-title{
  margin-top:28px;
  font-size:20px;
  font-weight:bold;
  color:#333;
}

.insight-card{
  background:#fff;
  border-radius:22px;
  padding:20px;
  margin-top:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  line-height:1.6;
}
  
</style>

</head>

<body>

<div class="app">

  <div class="header">
    <h1>📊 Admin Dashboard</h1>
    <p>Wellness Challenge Management</p>
  </div>

  <div class="section-title">📌 ภาพรวมวันนี้</div>

  <div class="grid">

  <div class="card">
    <div class="card-title">ผู้ใช้งานทั้งหมด</div>
    <div class="card-value" id="totalUsers">-</div>
  </div>

  <div class="card">
    <div class="card-title">Active Users วันนี้</div>
    <div class="card-value" id="activeUsersToday">-</div>
  </div>

  <div class="card">
    <div class="card-title">Streak สูงสุด</div>
    <div class="card-value" id="topStreak">-</div>
  </div>

  <div class="card">
    <div class="card-title">Basic วันนี้</div>
    <div class="card-value" id="basicToday">-</div>
  </div>

  <div class="card">
    <div class="card-title">Weekly วันนี้</div>
    <div class="card-value" id="weeklyToday">-</div>
  </div>

  <div class="card">
    <div class="card-title">Basic Completion</div>
    <div class="card-value" id="basicRate">-</div>
  </div>

  <div class="card">
    <div class="card-title">Weekly Completion</div>
    <div class="card-value" id="weeklyRate">-</div>
  </div>

  <div class="card">
    <div class="card-title">ซื้อน้ำแข็ง</div>
    <div class="card-value" id="freezePurchases">-</div>
  </div>

</div>

<div class="section-title">🔥 Engagement</div>
  
<div class="card" style="margin-top:20px;">
  <div class="card-title">Top Active Users</div>
  <div id="topActiveUsers" style="margin-top:12px;">-</div>
</div>

<div class="section-title">💡 Insight</div>
  
<div class="card" style="margin-top:20px;">
  <div class="card-title">วันที่กิจกรรมต่ำสุด</div>
  <div class="card-value" id="mostSkippedDay">-</div>
</div>

  </div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

async function jsonp(action){

  return new Promise((resolve,reject)=>{

    const callbackName =
      "cb_" + Math.random().toString(36).substring(2);

    window[callbackName] = function(data){
      resolve(data);
      script.remove();
      delete window[callbackName];
    };

    const script = document.createElement("script");

    script.src =
      GAS_URL +
      "?action=" + action +
      "&callback=" + callbackName;

    script.onerror = reject;

    document.body.appendChild(script);

  });

}

async function loadDashboard(){

  const data = await jsonp("getAdminDashboard");

  document.getElementById("totalUsers").innerText =
  data.dashboard.totalUsers || 0;

document.getElementById("activeUsersToday").innerText =
  data.dashboard.activeUsersToday || 0;

document.getElementById("topStreak").innerText =
  data.dashboard.topStreak || 0;

document.getElementById("basicToday").innerText =
  data.dashboard.basicSubmitsToday || 0;

document.getElementById("weeklyToday").innerText =
  data.dashboard.weeklySubmitsToday || 0;

document.getElementById("basicRate").innerText =
  (data.dashboard.basicCompletionRate || 0) + "%";

document.getElementById("weeklyRate").innerText =
  (data.dashboard.weeklyCompletionRate || 0) + "%";

document.getElementById("freezePurchases").innerText =
  data.dashboard.freezePurchases || 0;

document.getElementById("mostSkippedDay").innerText =
  data.dashboard.mostSkippedDay || "-";

let topHtml = "";

data.dashboard.topActiveUsers.forEach(function(user, index){
  topHtml += "#" + (index + 1) + " " + user.name + " - " + user.count + " ครั้ง<br>";
});

document.getElementById("topActiveUsers").innerHTML =
  topHtml || "-";

}

loadDashboard();

</script>
  
</body>
</html>
