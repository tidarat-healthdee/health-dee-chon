<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#333;
}

.app{
  max-width:480px;
  margin:auto;
  padding:20px;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#43a047);
  color:white;
  padding:24px;
  border-radius:24px;
  box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin-top:8px;
  opacity:0.9;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card-title{
  color:#777;
  font-size:14px;
}

.card-value{
  font-size:34px;
  font-weight:bold;
  margin-top:10px;
}

</style>

</head>

<body>

<div class="app">

  <div class="header">
    <h1>📊 Admin Dashboard</h1>
    <p>Wellness Challenge Management</p>
  </div>

  <div class="grid">

    <div class="card">
      <div class="card-title">ผู้ใช้งานทั้งหมด</div>
      <div class="card-value" id="totalUsers">-</div>
    </div>

    <div class="card">
      <div class="card-title">ส่งภารกิจวันนี้</div>
      <div class="card-value" id="todaySubmits">-</div>
    </div>

    <div class="card">
      <div class="card-title">Streak สูงสุด</div>
      <div class="card-value" id="topStreak">-</div>
    </div>

    <div class="card">
      <div class="card-title">Active Users วันนี้</div>
      <div class="card-value" id="freezeUsed">-</div>
    </div>

  </div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbz1W5e1oCIS--Azg49vevMNUMLckaTkoqnt4Ze1t026aj_WyeYZw1-PV8BWx-u8LrQHqA/exec";

async function jsonp(action){

  return new Promise((resolve,reject)=>{

    const callbackName =
      "cb_" + Math.random().toString(36).substring(2);

    window[callbackName] = function(data){
      resolve(data);
      script.remove();
      delete window[callbackName];
    };

    const script = document.createElement("script");

    script.src =
      GAS_URL +
      "?action=" + action +
      "&callback=" + callbackName;

    script.onerror = reject;

    document.body.appendChild(script);

  });

}

async function loadDashboard(){

  const data = await jsonp("getAdminDashboard");

  document.getElementById("totalUsers").innerText =
    data.dashboard.totalUsers || 0;

  document.getElementById("todaySubmits").innerText =
    data.dashboard.totalSubmissions || 0;

  document.getElementById("topStreak").innerText =
  data.dashboard.topStreak || 0;

document.getElementById("freezeUsed").innerText =
  data.dashboard.activeUsersToday || 0;

}

loadDashboard();

</script>
  
</body>
</html>
